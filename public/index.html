<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>JetBrains custom plugin marketplace</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           max-width: 720px; margin: 4rem auto; padding: 0 1rem; line-height: 1.5; color: #222; }
    code, pre { background: #f4f4f4; padding: 0.1rem 0.3rem; border-radius: 3px; }
    pre { padding: 0.8rem; overflow-x: auto; }
    a { color: #1f6feb; }
  </style>
</head>
<body>
  <h1>JetBrains custom plugin marketplace</h1>
  <p>This server hosts a custom plugin repository for IntelliJ-based IDEs.</p>
  <p>Add this URL in <em>Settings → Plugins → ⚙ → Manage Plugin Repositories</em>:</p>
  <pre><code>/updatePlugins.xml</code></pre>
  <p>See <a href="updatePlugins.xml">updatePlugins.xml</a> for the current plugin list.</p>
</body>
</html>
