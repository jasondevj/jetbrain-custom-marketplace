server {
    listen 80;
    server_name _;

    root /srv/static;
    index index.html;

    # IntelliJ polls updatePlugins.xml periodically — keep cache short so
    # new mirrored plugins show up quickly after restarting the container.
    location = /updatePlugins.xml {
        default_type application/xml;
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    # Locally cached plugin artifacts (only populated in LOCAL_CACHE=true mode).
    # Large files; let nginx stream them with a long cache lifetime.
    location /plugins/ {
        add_header Cache-Control "public, max-age=86400, immutable";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "public, max-age=60";
        try_files $uri $uri/ =404;
    }
}
